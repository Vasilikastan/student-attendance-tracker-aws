<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo">SAT</div>
        <div>
            <h1>Student Attendance Tracker</h1>
            <p>Cloud-based attendance management system</p>
        </div>
    </header>

    <main class="container">

        <section class="card">
            <h2>Add Attendance Record</h2>

            <form id="attendanceForm">
                <label>Student ID:</label>
                <input type="text" id="studentId" placeholder="Example: S010" required>

                <label>Student Name:</label>
                <input type="text" id="studentName" placeholder="Example: John Smith" required>

                <label>Course:</label>
                <input type="text" id="course" placeholder="Example: Cloud Technologies" required>

                <label>Attendance Date:</label>
                <input type="date" id="attendanceDate" required>

                <label>Status:</label>
                <select id="status" required>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Late">Late</option>
                    <option value="Excused">Excused</option>
                </select>

                <button type="button" onclick="addRecord()" class="primary-btn">
                    Add Record
                </button>
            </form>
        </section>

        <section class="card">
            <div class="section-header">
                <h2>Attendance Records</h2>
                <button onclick="loadRecords()" class="secondary-btn">
                    Load Records
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Course</th>
                        <th>Attendance Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="recordsTable">
                    <tr>
                        <td colspan="6">Click "Load Records" to view data.</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
